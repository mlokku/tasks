{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'dashboard' %}">Tracker</a>
    <nav class="nav">
      <a href="{% url 'inbox' %}">Inbox</a>
      <a href="{% url 'day' %}">Day</a>
      <a href="{% url 'up_next' %}">Up Next</a>
      <a href="{% url 'weekly_review' %}">Review</a>
      <a href="{% url 'project_create' %}">New project</a>
      <a href="{% url 'task_create' %}">New task</a>
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" class="inline-form">
          {% csrf_token %}
          <button type="submit" class="link-button">Log out</button>
        </form>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
