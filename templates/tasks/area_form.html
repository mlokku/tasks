{% extends "base.html" %}
{% block title %}Area - Tracker{% endblock %}
{% block content %}
  <section class="form-panel">
    <h1>{% if object %}Edit area{% else %}New area{% endif %}</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save area</button>
    </form>
  </section>
{% endblock %}
