{% extends "base.html" %}

{% block title %}Log in - Tracker{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Log in</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>
        Username
        {{ form.username }}
      </label>
      <label>
        Password
        {{ form.password }}
      </label>
      <button type="submit">Log in</button>
    </form>
  </section>
{% endblock %}
