{% extends "base.html" %}
{% block title %}Project - Tracker{% endblock %}
{% block content %}
  <section class="form-panel">
    <h1>{% if object %}Edit project{% else %}New project{% endif %}</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save project</button>
    </form>
  </section>
{% endblock %}
