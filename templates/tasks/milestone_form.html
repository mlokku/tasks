{% extends "base.html" %}
{% block title %}Milestone - TaskTracker{% endblock %}
{% block content %}
  <section class="form-panel">
    <h1>{% if object %}Edit milestone{% else %}New milestone{% endif %}</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>Project {{ form.project }}{{ form.project.errors }}</label>
      <label>Title {{ form.title }}{{ form.title.errors }}</label>
      <label>Notes {{ form.notes }}{{ form.notes.errors }}</label>
      <label>Order {{ form.order }}{{ form.order.errors }}</label>
      <label>Status {{ form.status }}{{ form.status.errors }}</label>
      <label class="color-picker">Color {{ form.color }}{{ form.color.errors }}<span class="color-swatches" data-color-swatches></span></label>
      <label>Target date {{ form.target_date }}{{ form.target_date.errors }}</label>
      <button type="submit">Save milestone</button>
    </form>
  </section>
{% endblock %}
