{% extends "base.html" %}
{% block title %}Milestone - Tracker{% endblock %}
{% block content %}
  <section class="form-panel">
    <h1>{% if object %}Edit milestone{% else %}New milestone{% endif %}</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save milestone</button>
    </form>
  </section>
{% endblock %}
